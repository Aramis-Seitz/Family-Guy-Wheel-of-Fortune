<link rel="stylesheet" href="./modals_mockup.css">

<div class="shop-mockup-shell">
  <div class="mockup-toolbar">
    <button class="mockup-pill-btn spin-left">SPIN LEFT</button>
    <button class="mockup-pill-btn spin-right">SPIN RIGHT</button>
    <button class="mockup-pill-btn reset">RESET</button>
    <button class="mockup-pill-btn share">Share &gt;3</button>
    <button class="mockup-pill-btn inventory is-current">INVENTORY</button>
    <button class="mockup-pill-btn shop">SHOP</button>
  </div>

  <div class="mockup-modal">
    <div class="mockup-header">
      <div class="mockup-header-spacer"></div>
      <h2 class="mockup-title">Inventar</h2>
      <button class="mockup-close-btn">✕</button>
    </div>

    <div class="mockup-tabs">
      <button class="mockup-tab with-icon">
        <i class="ti ti-list mockup-icon-tab" aria-hidden="true"></i>
        Presets
      </button>
      <button class="mockup-tab with-icon is-active">
        <i class="ti ti-volume mockup-icon-tab" aria-hidden="true"></i>
        Sounds
      </button>
      <button class="mockup-tab with-icon">
        <i class="ti ti-user mockup-icon-tab" aria-hidden="true"></i>
        Begleiter
      </button>
    </div>

    <p class="mockup-helper-text">Wähle einen Sound für das Tick-Geräusch beim Spinnen.</p>

    <div class="mockup-grid">
      <div class="mockup-item is-selected">
        <div class="mockup-thumb">
          <i class="ti ti-volume mockup-icon-volume" aria-hidden="true"></i>
        </div>
        <div class="mockup-item-row">
          <h3 class="mockup-item-title">Standard Tick</h3>
          <button title="Vorhören" aria-label="Vorhören" class="mockup-preview-btn is-large">
            <i class="ti ti-player-play mockup-icon-play-large" aria-hidden="true"></i>
          </button>
        </div>
        <button disabled class="mockup-action-btn is-activated">Aktiviert</button>
      </div>

      <div class="mockup-item">
        <div class="mockup-thumb">
          <i class="ti ti-volume mockup-icon-volume" aria-hidden="true"></i>
        </div>
        <div class="mockup-item-row">
          <h3 class="mockup-item-title">Cyberpunk Tick</h3>
          <button title="Vorhören" aria-label="Vorhören" class="mockup-preview-btn is-large">
            <i class="ti ti-player-play mockup-icon-play-large" aria-hidden="true"></i>
          </button>
        </div>
        <button class="mockup-action-btn is-buy">Aktivieren</button>
      </div>

      <div class="mockup-item">
        <div class="mockup-thumb">
          <i class="ti ti-volume mockup-icon-volume" aria-hidden="true"></i>
        </div>
        <div class="mockup-item-row">
          <h3 class="mockup-item-title">Drumroll FX</h3>
          <button title="Vorhören" aria-label="Vorhören" class="mockup-preview-btn is-large">
            <i class="ti ti-player-play mockup-icon-play-large" aria-hidden="true"></i>
          </button>
        </div>
        <button class="mockup-action-btn is-buy">Aktivieren</button>
      </div>

      <div class="mockup-empty-item">
        <i class="ti ti-shopping-bag mockup-icon-bag" aria-hidden="true"></i>
        <p class="mockup-empty-text">Mehr Sounds<br>im Shop entdecken</p>
        <button class="mockup-open-shop-btn">Shop öffnen →</button>
      </div>
    </div>
  </div>
</div>
