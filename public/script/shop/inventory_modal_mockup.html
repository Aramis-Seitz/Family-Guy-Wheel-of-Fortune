<div style="background: #000; border-radius: 12px; padding: 24px; min-height: 720px; font-family: 'Segoe UI', sans-serif;">

  <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;">
    <button style="background: #f5c542; color: #111; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">SPIN LEFT</button>
    <button style="background: #f5a623; color: #111; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">SPIN RIGHT</button>
    <button style="background: #555; color: #ccc; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">RESET</button>
    <button style="background: #d63384; color: #fff; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">Share &gt;3</button>
    <button style="background: #00a2ff; color: #111; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px; outline: 2px solid #fff;">INVENTORY</button>
    <button style="background: #22c55e; color: #111; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">SHOP</button>
  </div>

  <div style="background: rgba(20, 25, 35, 0.92); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px; max-width: 1100px; margin: 0 auto; box-shadow: 0 30px 80px rgba(0,0,0,0.6);">

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;">
      <div style="width: 40px;"></div>
      <h2 style="color: #fff; font-size: 22px; font-weight: 500; margin: 0; letter-spacing: 0.5px;">Inventar</h2>
      <button style="background: none; border: 1px solid #444; color: #aaa; border-radius: 8px; padding: 4px 10px;">✕</button>
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px;">
      <button style="background: transparent; color: #aaa; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 7px 16px; font-size: 13px; display: flex; align-items: center; gap: 6px;">
        <i class="ti ti-list" style="font-size: 14px;" aria-hidden="true"></i>
        Presets
      </button>
      <button style="background: rgba(0, 162, 255, 0.18); color: #fff; border: 1px solid rgba(0, 162, 255, 0.45); border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px;">
        <i class="ti ti-volume" style="font-size: 14px;" aria-hidden="true"></i>
        Sounds
      </button>
      <button style="background: transparent; color: #aaa; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 7px 16px; font-size: 13px; display: flex; align-items: center; gap: 6px;">
        <i class="ti ti-user" style="font-size: 14px;" aria-hidden="true"></i>
        Begleiter
      </button>
    </div>

    <p style="color: #888; font-size: 12px; margin: 0 0 14px;">Wähle einen Sound für das Tick-Geräusch beim Spinnen.</p>

    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">

      <div style="background: rgba(0, 162, 255, 0.18); border: 2px solid #22c55e; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;">
        <div style="background: rgba(0,0,0,0.3); border-radius: 10px; height: 100px; display: flex; align-items: center; justify-content: center; color: #00a2ff;">
          <i class="ti ti-volume" style="font-size: 36px;" aria-hidden="true"></i>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 6px;">
          <h3 style="color: #fff; font-size: 13px; font-weight: 500; margin: 0;">Standard Tick</h3>
          <button title="Vorhören" aria-label="Vorhören" style="background: rgba(0, 162, 255, 0.25); border: none; border-radius: 50%; width: 28px; height: 28px; padding: 0; color: #fff; display: inline-flex; align-items: center; justify-content: center; line-height: 1;">
            <i class="ti ti-player-play" style="font-size: 14px; line-height: 1; display: block;" aria-hidden="true"></i>
          </button>
        </div>
        <button disabled style="background: transparent; color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.55); border-radius: 8px; padding: 7px; font-weight: 700; font-size: 12px;">Aktiviert</button>
      </div>

      <div style="background: rgba(0, 162, 255, 0.18); border: 1px solid rgba(0, 162, 255, 0.30); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;">
        <div style="background: rgba(0,0,0,0.3); border-radius: 10px; height: 100px; display: flex; align-items: center; justify-content: center; color: #00a2ff;">
          <i class="ti ti-volume" style="font-size: 36px;" aria-hidden="true"></i>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 6px;">
          <h3 style="color: #fff; font-size: 13px; font-weight: 500; margin: 0;">Cyberpunk Tick</h3>
          <button title="Vorhören" aria-label="Vorhören" style="background: rgba(0, 162, 255, 0.25); border: none; border-radius: 50%; width: 28px; height: 28px; padding: 0; color: #fff; display: inline-flex; align-items: center; justify-content: center; line-height: 1;">
            <i class="ti ti-player-play" style="font-size: 14px; line-height: 1; display: block;" aria-hidden="true"></i>
          </button>
        </div>
        <button style="background: #00a2ff; color: #111; border: none; border-radius: 8px; padding: 7px; font-weight: 700; font-size: 12px;">Aktivieren</button>
      </div>

      <div style="background: rgba(0, 162, 255, 0.18); border: 1px solid rgba(0, 162, 255, 0.30); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;">
        <div style="background: rgba(0,0,0,0.3); border-radius: 10px; height: 100px; display: flex; align-items: center; justify-content: center; color: #00a2ff;">
          <i class="ti ti-volume" style="font-size: 36px;" aria-hidden="true"></i>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 6px;">
          <h3 style="color: #fff; font-size: 13px; font-weight: 500; margin: 0;">Drumroll FX</h3>
          <button title="Vorhören" aria-label="Vorhören" style="background: rgba(0, 162, 255, 0.25); border: none; border-radius: 50%; width: 28px; height: 28px; padding: 0; color: #fff; display: inline-flex; align-items: center; justify-content: center; line-height: 1;">
            <i class="ti ti-player-play" style="font-size: 14px; line-height: 1; display: block;" aria-hidden="true"></i>
          </button>
        </div>
        <button style="background: #00a2ff; color: #111; border: none; border-radius: 8px; padding: 7px; font-weight: 700; font-size: 12px;">Aktivieren</button>
      </div>

      <div style="background: transparent; border: 1px dashed rgba(0, 162, 255, 0.25); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; color: #aaa; gap: 10px;">
        <i class="ti ti-shopping-bag" style="font-size: 32px; color: #00a2ff;" aria-hidden="true"></i>
        <p style="margin: 0; font-size: 12px; text-align: center; line-height: 1.5;">Mehr Sounds<br>im Shop entdecken</p>
        <button style="background: transparent; color: #00a2ff; border: 1px solid rgba(0, 162, 255, 0.45); border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 500;">Shop öffnen →</button>
      </div>

    </div>

  </div>
</div>
