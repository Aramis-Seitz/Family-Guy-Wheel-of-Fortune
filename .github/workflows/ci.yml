name: CI
 
on:
  pull_request:
  push:
    branches:
      - main
      - develop
 
jobs:
  ci:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
 
      - name: Install Dependencies
        run: npm ci
 
      - name: Fix optional dependencies
        run: npm install --ignore-scripts
      
      - name: ESLint
        run: npm run lint
 
      - name: Unit Tests
        run: npm run test
 
      - name: Typecheck
        run: npm run typecheck

      - name: Validate locales
        run: npm run check:i18n
 
      - name: Link Supabase Project
        run: npx supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
 
      - name: Repair Migration History (Falsche Version 12 löschen)
        run: npx supabase migration repair --status reverted 12 --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run DB Migrations
        run: npx supabase db push --linked --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
 
      - name: Build
        run: npm run build
 