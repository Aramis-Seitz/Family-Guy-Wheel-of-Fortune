<link rel="stylesheet" href="./modals_mockup.css">

<div class="shop-mockup-shell">
  <div class="mockup-toolbar">
    <button class="mockup-pill-btn spin-left">SPIN LEFT</button>
    <button class="mockup-pill-btn spin-right">SPIN RIGHT</button>
    <button class="mockup-pill-btn reset">RESET</button>
    <button class="mockup-pill-btn share">Share &gt;3</button>
    <button class="mockup-pill-btn inventory">INVENTORY</button>
    <button class="mockup-pill-btn shop is-current">SHOP</button>
  </div>

  <div class="mockup-modal">
    <div class="mockup-header">
      <div class="mockup-header-spacer"></div>
      <h2 class="mockup-title">Shop</h2>
      <div class="mockup-header-actions">
        <div class="mockup-currency-pill">
          <span class="mockup-currency-dot"></span>
          <span class="mockup-currency-text">15 levvis</span>
        </div>
        <button class="mockup-close-btn">✕</button>
      </div>
    </div>

    <div class="mockup-tabs">
      <button class="mockup-tab is-active">Alle</button>
      <button class="mockup-tab">Sounds</button>
      <button class="mockup-tab">Begleiter</button>
    </div>

    <div class="mockup-grid">
      <div class="mockup-item is-relative">
        <div class="mockup-thumb">
          <i class="ti ti-volume mockup-icon-volume" aria-hidden="true"></i>
        </div>
        <div class="mockup-item-row">
          <h3 class="mockup-item-title">Cyberpunk Tick</h3>
          <button title="Vorhören" aria-label="Vorhören" class="mockup-preview-btn">
            <i class="ti ti-player-play mockup-icon-play" aria-hidden="true"></i>
          </button>
        </div>
        <button class="mockup-action-btn is-buy">
          Kaufen
          <span class="mockup-coin-mini"></span>
          10
        </button>
      </div>

      <div class="mockup-item is-green is-relative">
        <span class="mockup-status-badge">AKTIV</span>
        <div class="mockup-thumb is-green">
          <i class="ti ti-volume mockup-icon-volume" aria-hidden="true"></i>
        </div>
        <div class="mockup-item-row">
          <h3 class="mockup-item-title">Standard Tick</h3>
          <button title="Vorhören" aria-label="Vorhören" class="mockup-preview-btn is-green">
            <i class="ti ti-player-play mockup-icon-play" aria-hidden="true"></i>
          </button>
        </div>
        <button disabled class="mockup-action-btn is-active">Aktiv</button>
      </div>

      <div class="mockup-item">
        <div class="mockup-thumb">
          <i class="ti ti-volume mockup-icon-volume" aria-hidden="true"></i>
        </div>
        <div class="mockup-item-row">
          <h3 class="mockup-item-title">Drumroll FX</h3>
          <button title="Vorhören" aria-label="Vorhören" class="mockup-preview-btn">
            <i class="ti ti-player-play mockup-icon-play" aria-hidden="true"></i>
          </button>
        </div>
        <button class="mockup-action-btn is-owned">Besessen</button>
      </div>

      <div class="mockup-item is-low-levvis">
        <div class="mockup-thumb is-muted">
          <i class="ti ti-volume mockup-icon-volume" aria-hidden="true"></i>
        </div>
        <div class="mockup-item-row">
          <h3 class="mockup-item-title">Premium Bell</h3>
          <button title="Vorhören" aria-label="Vorhören" class="mockup-preview-btn is-muted">
            <i class="ti ti-player-play mockup-icon-play" aria-hidden="true"></i>
          </button>
        </div>
        <button disabled class="mockup-action-btn is-disabled-low">Zu wenig levvis (50)</button>
      </div>

      <div class="mockup-item">
        <div class="mockup-thumb">
          <i class="ti ti-user mockup-icon-user" aria-hidden="true"></i>
        </div>
        <h3 class="mockup-item-title">Quagmire</h3>
        <button class="mockup-action-btn is-buy">
          Kaufen
          <span class="mockup-coin-mini"></span>
          15
        </button>
      </div>

      <div class="mockup-item">
        <div class="mockup-thumb">
          <i class="ti ti-user mockup-icon-user" aria-hidden="true"></i>
        </div>
        <h3 class="mockup-item-title">Stewie</h3>
        <button class="mockup-action-btn is-buy">
          Kaufen
          <span class="mockup-coin-mini"></span>
          12
        </button>
      </div>

      <div class="mockup-item">
        <div class="mockup-thumb">
          <i class="ti ti-user mockup-icon-user" aria-hidden="true"></i>
        </div>
        <h3 class="mockup-item-title">Brian</h3>
        <button class="mockup-action-btn is-buy">
          Kaufen
          <span class="mockup-coin-mini"></span>
          20
        </button>
      </div>

      <div class="mockup-item is-low-levvis">
        <div class="mockup-thumb is-muted">
          <i class="ti ti-user mockup-icon-user" aria-hidden="true"></i>
        </div>
        <h3 class="mockup-item-title">Peter Griffin</h3>
        <button disabled class="mockup-action-btn is-disabled-low">Zu wenig levvis (30)</button>
      </div>
    </div>
  </div>
</div>
