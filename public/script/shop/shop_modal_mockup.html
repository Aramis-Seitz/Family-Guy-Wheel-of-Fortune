<div style="background: #000; border-radius: 12px; padding: 24px; min-height: 720px; font-family: 'Segoe UI', sans-serif;">

  <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;">
    <button style="background: #f5c542; color: #111; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">SPIN LEFT</button>
    <button style="background: #f5a623; color: #111; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">SPIN RIGHT</button>
    <button style="background: #555; color: #ccc; border: none; border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 13px;">RESET</button>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;">

          <span style="display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: #f5c542;"></span>
          <span style="color: #f5c542; font-weight: 700; font-size: 14px;">15 levvis</span>
        </div>
        <button style="background: none; border: 1px solid #444; color: #aaa; border-radius: 8px; padding: 4px 10px; cursor: pointer;">✕</button>

    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px;">

    </div>

    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">

      <div style="background: rgba(0, 162, 255, 0.18); border: 1px solid rgba(0, 162, 255, 0.30); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px; position: relative;">
        <div style="background: rgba(0,0,0,0.3); border-radius: 10px; height: 100px; display: flex; align-items: center; justify-content: center; color: #00a2ff;">
          <i class="ti ti-volume" style="font-size: 36px;" aria-hidden="true"></i>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 6px;">
          <h3 style="color: #fff; font-size: 13px; font-weight: 500; margin: 0;">Cyberpunk Tick</h3>
          <button title="Vorhören" aria-label="Vorhören" style="background: rgba(0, 162, 255, 0.25); border: none; border-radius: 50%; width: 26px; height: 26px; color: #fff; cursor: pointer; display: grid; place-items: center;">
            <i class="ti ti-player-play" style="font-size: 13px;" aria-hidden="true"></i>
          </button>
        </div>
        <button style="background: #00a2ff; color: #111; border: none; border-radius: 8px; padding: 7px; font-weight: 700; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;">

      <div style="background: rgba(0, 162, 255, 0.18); border: 1px solid rgba(0, 162, 255, 0.30); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;">

            <i class="ti ti-player-play" style="font-size: 13px;" aria-hidden="true"></i>

        </div>
        <button style="background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 7px; font-weight: 500; font-size: 12px;">Besessen</button>

      <div style="background: rgba(255, 100, 100, 0.08); border: 1px solid rgba(255, 100, 100, 0.25); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px; opacity: 0.85;">

          <i class="ti ti-user" style="font-size: 38px;" aria-hidden="true"></i>
        </div>
        <h3 style="color: #fff; font-size: 13px; font-weight: 500; margin: 0;">Stewie</h3>
        <button style="background: #00a2ff; color: #111; border: none; border-radius: 8px; padding: 7px; font-weight: 700; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;">
          Kaufen
          <span style="display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #f5c542;"></span>

      <div style="background: rgba(0, 162, 255, 0.18); border: 1px solid rgba(0, 162, 255, 0.30); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;">
        <div style="background: rgba(0,0,0,0.3); border-radius: 10px; height: 100px; display: flex; align-items: center; justify-content: center; color: #00a2ff;">
          <i class="ti ti-user" style="font-size: 38px;" aria-hidden="true"></i>

          Kaufen
          <span style="display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #f5c542;"></span>

      </div>

      <div style="background: rgba(255, 100, 100, 0.08); border: 1px solid rgba(255, 100, 100, 0.25); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px; opacity: 0.85;">
        <div style="background: rgba(0,0,0,0.3); border-radius: 10px; height: 100px; display: flex; align-items: center; justify-content: center; color: #888;">
          <i class="ti ti-user" style="font-size: 38px;" aria-hidden="true"></i>
        </div>
        <h3 style="color: #fff; font-size: 13px; font-weight: 500; margin: 0;">Peter Griffin</h3>
        <button disabled style="background: rgba(255,255,255,0.04); color: #d97777; border: 1px solid rgba(255, 100, 100, 0.25); border-radius: 8px; padding: 7px; font-weight: 500; font-size: 11px;">Zu wenig levvis (30)</button>

    </div>
